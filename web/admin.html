<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자 페이지</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f6fa;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      background: white;
      border-bottom: 1px solid #e8eaf0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }
    .navbar-left { display: flex; align-items: center; gap: 10px; }
    .hamburger { background: none; border: none; font-size: 20px; cursor: pointer; color: #555; }
    .navbar-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: #1a1a2e; }
    .navbar-logo .leaf { font-size: 20px; }
    .navbar-right { display: flex; align-items: center; gap: 14px; }
    .navbar-bell { position: relative; font-size: 20px; cursor: pointer; color: #555; }
    .bell-badge {
      position: absolute; top: -4px; right: -6px;
      background: #e74c3c; color: white; font-size: 9px; font-weight: 700;
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .navbar-user { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .user-name { font-size: 14px; color: #333; font-weight: 500; }

    .layout { display: flex; padding-top: 56px; min-height: 100vh; }

    .sidebar {
      width: 200px; background: white; border-right: 1px solid #e8eaf0;
      padding: 1.5rem 0; flex-shrink: 0; position: fixed;
      top: 56px; left: 0; bottom: 0; overflow-y: auto;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 0.75rem 1.5rem; font-size: 14px; color: #555;
      cursor: pointer; text-decoration: none; transition: background 0.15s;
    }
    .nav-item i { font-size: 18px; }
    .nav-item.active { background: #f0f0f8; color: #488866; font-weight: 600; border-left: 3px solid #274725; }
    .nav-item:hover:not(.active) { background: #f8f8fb; color: #333; }

    .main { margin-left: 200px; flex: 1; display: flex; flex-direction: column; }

    .hero {
      background: linear-gradient(135deg, #56b870 0%, #56b870 100%);
      padding: 2rem 2.5rem;
      color: white;
    }
    .hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .hero p { font-size: 14px; opacity: 0.85; }

    .content { padding: 2rem 2.5rem; flex: 1; }

    .welcome-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
    .welcome-row .wave { font-size: 22px; }
    .welcome-row .welcome-text { font-size: 15px; font-weight: 600; color: #333; }
    .welcome-row .welcome-sub { font-size: 13px; color: #888; }

    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.5rem; }
    .menu-card {
      background: white; border: 1px solid #eee; border-radius: 16px;
      padding: 2rem 1.5rem; display: flex; flex-direction: column;
      align-items: center; gap: 0; text-align: center;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04); transition: box-shadow 0.15s;
    }
    .menu-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .menu-icon-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; margin-bottom: 1rem;
    }
    .menu-icon-wrap.blue { background: #eef0fb; color: #264423; }
    .menu-icon-wrap.green { background: #e8f5ee; color: #2d6a4f; }
    .menu-card-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .menu-card-desc { font-size: 12px; color: #888; margin-bottom: 1.2rem; line-height: 1.5; }
    .menu-go-btn {
      width: 100%; padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid #e0e0e0;
      background: #fafafa; font-size: 13px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: inherit; transition: background 0.15s;
    }
    .menu-go-btn.blue-btn { color: #3a5c34; border-color: #d0d4f5; }
    .menu-go-btn.blue-btn:hover { background: #eef0fb; }
    .menu-go-btn.green-btn { color: #2d6a4f; border-color: #b7d9c5; }
    .menu-go-btn.green-btn:hover { background: #e8f5ee; }

    .emergency-card {
      background: white; border: 1px solid #fbd5d5; border-radius: 14px;
      padding: 1.2rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      margin-bottom: 1.5rem;
    }
    .emergency-left { display: flex; align-items: center; gap: 14px; }
    .emergency-icon {
      width: 44px; height: 44px; border-radius: 50%; background: #fde8e8;
      display: flex; align-items: center; justify-content: center; font-size: 20px; color: #C82D2D;
    }
    .emergency-title { font-size: 15px; font-weight: 700; color: #C82D2D; margin-bottom: 3px; }
    .emergency-desc { font-size: 12px; color: #888; }
    .emergency-btn {
      background: #C82D2D; color: white; border: none; border-radius: 10px;
      padding: 0.7rem 1.4rem; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 8px; font-family: inherit;
      transition: background 0.15s;
    }
    .emergency-btn:hover { background: #a32020; }
    .resume-btn {
      background: #2d6a4f; color: white; border: none; border-radius: 10px;
      padding: 0.7rem 1.4rem; font-size: 14px; font-weight: 600; cursor: pointer;
      display: none; align-items: center; gap: 8px; font-family: inherit;
      transition: background 0.15s;
    }
    .resume-btn:hover { background: #1f4d38; }

    .footer { text-align: center; font-size: 12px; color: #bbb; padding: 1rem 2.5rem 1.5rem; }

    .mic-fab {
      position: fixed; bottom: 2rem; right: 2rem;
      width: 52px; height: 52px; border-radius: 50%;
      background: #56b870; border: none; color: white; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(35,77,46,0.4);
      transition: background 0.2s, transform 0.2s;
      z-index: 200;
    }
    .mic-fab:hover { background: #3a5a35; transform: scale(1.05); }
    .mic-fab.recording {
      background: #e74c3c;
      animation: fabPulse 1s infinite;
    }
    @keyframes fabPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(231,76,60,0); }
    }

    .chat-panel {
      position: fixed;
      bottom: 90px; right: 2rem;
      width: 360px;
      height: 520px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 199;
      transform: translateY(20px) scale(0.95);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
    }
    .chat-panel.open {
      transform: translateY(0) scale(1);
      opacity: 1;
      pointer-events: all;
    }

    .chat-header {
      background: #56b870;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { color: white; font-weight: 700; font-size: 14px; }
    .chat-header-status { color: rgba(255,255,255,0.8); font-size: 11px; margin-top: 1px; }
    .chat-header-status .sdot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #a8f0ba; margin-right: 4px; vertical-align: middle;
    }
    .chat-close-btn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: background 0.15s;
    }
    .chat-close-btn:hover { background: rgba(255,255,255,0.35); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f5f6fa;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    .msg-row { display: flex; align-items: flex-end; gap: 6px; }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: #56b870;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }

    .msg-col { display: flex; flex-direction: column; max-width: 75%; }
    .msg-row.user .msg-col { align-items: flex-end; }

    .bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-row.ai .bubble {
      background: white;
      color: #222;
      border: 1px solid #e8eaf0;
      border-bottom-left-radius: 4px;
    }
    .msg-row.user .bubble {
      background: #56b870;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 10px; color: #aaa; margin-top: 3px; padding: 0 2px;
    }

    .typing-bubble {
      background: white; border: 1px solid #e8eaf0;
      border-radius: 16px; border-bottom-left-radius: 4px;
      padding: 10px 14px; display: flex; gap: 4px; align-items: center;
    }
    .typing-bubble span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #aaa; animation: tdot 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%,80%,100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .chat-input-area {
      background: white;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
    .chat-text-input {
      flex: 1;
      padding: 9px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 20px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    .chat-text-input:focus { border-color: #56b870; background: white; }

    .chat-icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s;
      font-size: 16px;
    }
    .chat-icon-btn:active { transform: scale(0.9); }
    .chat-mic-btn { background: #56b870; color: white; }
    .chat-mic-btn.recording { background: #e74c3c; animation: fabPulse 1s infinite; }
    .chat-send-btn { background: #56b870; color: white; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1a2e; color: white; padding: 10px 22px;
      border-radius: 24px; font-size: 13px; z-index: 99999;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <nav class="navbar">
    <div class="navbar-left">
      <button class="hamburger">☰</button>
      <div class="navbar-logo">
        <img src="https://resonant-violet-tfxsbq9wle.edgeone.app/%EB%A1%9C%EA%B3%A03%20%EB%88%84%EB%81%BC.png" alt="클린토피아" style="height:40px; width:auto; mix-blend-mode:multiply;">
        클린토피아
      </div>
    </div>
    <div class="navbar-right">
      <div class="navbar-bell">
        <i class="ti ti-bell"></i>
        <div class="bell-badge">3</div>
      </div>
      <div class="navbar-user">
        <div class="user-avatar">👤</div>
        <span class="user-name">관리자 ▾</span>
      </div>
    </div>
  </nav>

  <div class="layout">
    <div class="sidebar">
      <a class="nav-item active" href="#">
        <i class="ti ti-home"></i> 홈
      </a>
      <a class="nav-item" href="production.html">
        <i class="ti ti-clipboard-list"></i> 발주·입고·작업관리
      </a>
      <a class="nav-item" href="gwanri.html">
        <i class="ti ti-settings"></i> 시스템 관리
      </a>
      <a class="nav-item" href="#">
        <i class="ti ti-speakerphone"></i> 공지사항
      </a>
      <a class="nav-item" href="#">
        <i class="ti ti-logout"></i> 로그아웃
      </a>
    </div>

    <div class="main">
      <div class="hero">
        <h1>관리자 페이지</h1>
        <p>서비스를 효율적으로 관리하고 운영하세요.</p>
      </div>

      <div class="content">
        <div class="welcome-row">
          <span class="wave">👋</span>
          <div>
            <div class="welcome-text">관리자님, 좋은 하루 되세요!</div>
            <div class="welcome-sub">필요한 메뉴를 선택하여 업무를 시작하세요.</div>
          </div>
        </div>

        <div class="menu-grid">
          <div class="menu-card">
            <div class="menu-icon-wrap blue">
              <i class="ti ti-clipboard-list"></i>
            </div>
            <div class="menu-card-title">발주·입고·작업관리</div>
            <div class="menu-card-desc">발주, 입고 및 작업현황을 관리합니다.</div>
            <button class="menu-go-btn blue-btn" onclick="location.href='production.html'">
              바로가기 <i class="ti ti-chevron-right"></i>
            </button>
          </div>

          <div class="menu-card">
            <div class="menu-icon-wrap green">
              <i class="ti ti-settings"></i>
            </div>
            <div class="menu-card-title">시스템 관리</div>
            <div class="menu-card-desc">시스템 설정 및 관리 기능을 제공합니다.</div>
            <button class="menu-go-btn green-btn" onclick="location.href='gwanri.html'">
              바로가기 <i class="ti ti-chevron-right"></i>
            </button>
          </div>
        </div>

        <div class="emergency-card">
          <div class="emergency-left">
            <div class="emergency-icon"><i class="ti ti-alert-triangle"></i></div>
            <div>
              <div class="emergency-title">비상정지</div>
              <div class="emergency-desc">시스템에 문제가 발생했을 경우 비상정지 버튼을 눌러주세요.</div>
            </div>
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <button class="emergency-btn" onclick="emergencyStop()">
              <i class="ti ti-alert-triangle"></i> 비상정지
            </button>
            <button class="resume-btn" id="resume-btn" onclick="resumeWork()">
              <i class="ti ti-player-play"></i> 작업재개
            </button>
          </div>
        </div>

        <div class="footer">© 2024 우리집 분리수거. All rights reserved.</div>
      </div>
    </div>
  </div>

  <button class="mic-fab" id="mic-fab" onclick="toggleChat()" title="AI 어시스턴트">
    <i class="ti ti-message-chatbot"></i>
  </button>

  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <div class="chat-header-avatar">🤖</div>
      <div class="chat-header-info">
        <div class="chat-header-name">AI 관리 어시스턴트</div>
        <div class="chat-header-status"><span class="sdot"></span>온라인</div>
      </div>
      <button class="chat-close-btn" onclick="toggleChat()">
        <i class="ti ti-x"></i>
      </button>
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <div class="chat-input-area">
      <input type="text" class="chat-text-input" id="chat-input" placeholder="질문을 입력하세요..." />
      <button class="chat-icon-btn chat-mic-btn" id="chat-mic-btn" onclick="toggleMic()">
        <i class="ti ti-microphone"></i>
      </button>
      <button class="chat-icon-btn chat-send-btn" onclick="sendMessage()">
        <i class="ti ti-send"></i>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAX8v-CpJc4tuV2BoBFARWJ7L3kaYRJT1U",
      authDomain: "rokey-2.firebaseapp.com",
      projectId: "rokey-2",
      storageBucket: "rokey-2.firebasestorage.app",
      messagingSenderId: "632237117523",
      appId: "1:632237117523:web:eb4bd91a5e4e0be79f76a6",
      measurementId: "G-SGKLQ50W2M"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function emergencyStop() {
      try {
        await db.collection('start').doc('condition').update({ emergency_stop: 1 });
        showToast('🚨 비상정지 명령이 전송되었습니다.');
        document.getElementById('resume-btn').style.display = 'flex';
      } catch (e) {
        console.error('비상정지 오류:', e);
        showToast('❌ 비상정지 전송에 실패했습니다.');
      }
    }

    async function resumeWork() {
      try {
        await db.collection('start').doc('condition').update({ emergency_stop: 0 });
        showToast('✅ 작업이 재개되었습니다.');
        document.getElementById('resume-btn').style.display = 'none';
      } catch (e) {
        console.error('작업재개 오류:', e);
        showToast('❌ 작업재개 전송에 실패했습니다.');
      }
    }

    const AI_ASSISTANT_ENDPOINT = '/api/admin-assistant';

    let chatOpen = false;
    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chat-panel').classList.toggle('open', chatOpen);
      if (chatOpen && document.getElementById('chat-messages').children.length === 0) {
        appendAiMsg('안녕하세요! 관리 어시스턴트예요 😊\n발주 현황이나 쓰레기통 상태를 물어보세요!\n마이크 버튼으로 말씀하셔도 됩니다.');
      }
      if (chatOpen) setTimeout(() => document.getElementById('chat-input').focus(), 300);
    }

    function nowTime() {
      return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }

    function appendUserMsg(text) {
      const box = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML = `
        <div class="msg-col">
          <div class="bubble">${escHtml(text)}</div>
          <div class="msg-time">${nowTime()}</div>
        </div>`;
      box.appendChild(row);
      box.scrollTop = box.scrollHeight;
    }

    function appendAiMsg(text) {
      const box = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = 'msg-row ai';
      row.innerHTML = `
        <div class="msg-av">🤖</div>
        <div class="msg-col">
          <div class="bubble">${escHtml(text)}</div>
          <div class="msg-time">${nowTime()}</div>
        </div>`;
      box.appendChild(row);
      box.scrollTop = box.scrollHeight;
    }

    function showTyping() {
      const box = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = 'msg-row ai'; row.id = 'typing-row';
      row.innerHTML = `
        <div class="msg-av">🤖</div>
        <div class="typing-bubble"><span></span><span></span><span></span></div>`;
      box.appendChild(row);
      box.scrollTop = box.scrollHeight;
    }
    function hideTyping() { document.getElementById('typing-row')?.remove(); }

    function escHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    async function fetchData() {
      try {
        const [ordersSnap, trashSnap] = await Promise.all([
          db.collection('orders').get(),
          db.collection('trash_limit').get()
        ]);
        const orders = ordersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const trash  = trashSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        return { orders, trash };
      } catch(e) {
        console.error('Firebase 오류:', e);
        return { orders: [], trash: [] };
      }
    }

    async function askGPT(userMsg) {
      const { orders, trash } = await fetchData();

      const context = `
[발주 현황 - orders 컬렉션] 총 ${orders.length}건
${JSON.stringify(orders, null, 2)}

[쓰레기통 현황 - trash_limit 컬렉션]
${trash.map(t => `ID: ${t.id} | 종이: ${t.paper ?? '-'}% | 캔: ${t.can ?? '-'}% | 플라스틱: ${t.plastic ?? '-'}%`).join('\n')}
      `.trim();

      const res = await fetch(AI_ASSISTANT_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          max_tokens: 400,
          temperature: 0.7,
          messages: [
            {
              role: 'system',
              content: `당신은 클린토피아 관리자 페이지의 AI 어시스턴트입니다.
아래 실시간 데이터를 바탕으로 관리자의 질문에 친절하고 간결하게 답변하세요.
구체적인 숫자와 현황을 포함해 2~3문장으로 답변하세요.

주의: 발주 상태(status)는 다음과 같이 해석하세요.
- pending → 처리 대기 중
- completed → 완료
- in_progress → 진행 중
(status 필드가 없으면 상태 언급 생략)

${context}`
            },
            { role: 'user', content: userMsg }
          ]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.choices[0].message.content.trim();
    }

    async function sendMessage(text) {
      const input = document.getElementById('chat-input');
      const msg = text || input.value.trim();
      if (!msg) return;
      input.value = '';

      appendUserMsg(msg);
      showTyping();

      try {
        const reply = await askGPT(msg);
        hideTyping();
        appendAiMsg(reply);
      } catch(e) {
        hideTyping();
        appendAiMsg('오류가 발생했어요. API 키나 네트워크를 확인해주세요.');
        console.error(e);
      }
    }

    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecording = false;

    if (SR) {
      recognition = new SR();
      recognition.lang = 'ko-KR';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onresult = e => {
        const transcript = e.results[0][0].transcript;
        document.getElementById('chat-input').value = transcript;
        stopMic();
        sendMessage(transcript);
        document.getElementById('chat-input').value = '';
      };

      recognition.onend = () => stopMic();
      recognition.onerror = () => stopMic();
    }

    function stopMic() {
      isRecording = false;
      const btn = document.getElementById('chat-mic-btn');
      btn.classList.remove('recording');
      btn.innerHTML = '<i class="ti ti-microphone"></i>';
      if (recognition) recognition.stop();
    }

    function toggleMic() {
      if (!recognition) { showToast('❌ 이 브라우저는 음성인식을 지원하지 않아요'); return; }
      if (isRecording) {
        stopMic();
      } else {
        isRecording = true;
        const btn = document.getElementById('chat-mic-btn');
        btn.classList.add('recording');
        btn.innerHTML = '<i class="ti ti-microphone-off"></i>';
        recognition.start();
        showToast('🎙️ 듣고 있어요...');
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (isRecording) stopMic();
        if (chatOpen) toggleChat();
      }
    });
  </script>
</body>
</html>
