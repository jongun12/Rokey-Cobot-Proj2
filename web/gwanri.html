  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAX8v-CpJc4tuV2BoBFARWJ7L3kaYRJT1U",
      authDomain: "rokey-2.firebaseapp.com",
      projectId: "rokey-2",
      storageBucket: "rokey-2.firebasestorage.app",
      messagingSenderId: "632237117523",
      appId: "1:632237117523:web:eb4bd91a5e4e0be79f76a6",
      measurementId: "G-SGKLQ50W2M"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const docRef = doc(db, "trash_limit", "TvQe4stbmyYjewO8tKck");
    const cctvRef = doc(db, "CCTV", "CCTV2");

    let trashFull = false;
    let peopleVal = 0; // 0=없음, 1=감지됨, 2=작업중

    // ── 분리수거통 스냅샷 ──
    onSnapshot(docRef, (snapshot) => {
      if (!snapshot.exists()) return;
      const data = snapshot.data();
      const isFull = (data.plastic ?? 0) >= 30 || (data.paper ?? 0) >= 30 || (data.can ?? 0) >= 30;
      const newFlag = isFull ? 1 : 0;

      if ((data.flag ?? 0) !== newFlag) updateDoc(docRef, { flag: newFlag });

      trashFull = (newFlag === 1);

      const TOTAL = 30;
      const plastic = Math.round((data.plastic ?? 0) / TOTAL * 1000) / 10;
      const paper   = Math.round((data.paper   ?? 0) / TOTAL * 1000) / 10;
      const can     = Math.round((data.can     ?? 0) / TOTAL * 1000) / 10;
      updateBins(plastic, paper, can);
      renderNotifications();
    });

    // ── CCTV 사람 감지 스냅샷 ──
    onSnapshot(cctvRef, (snapshot) => {
      if (!snapshot.exists()) return;
      const data = snapshot.data();
      peopleVal = data.people ?? 0;
      renderNotifications();
    });

    function updateBins(plastic, paper, can) {
      const avg = Math.round((plastic + paper + can) / 3);
      document.getElementById('donut-val').textContent = avg + '%';
      setBar('bar-plastic', 'pct-plastic', plastic);
      setBar('bar-paper',   'pct-paper',   paper);
      setBar('bar-can',     'pct-can',     can);

      const C = 100;
      const pPl = (plastic / 100) * C;
      const pPa = (paper   / 100) * C;
      const pCa = (can     / 100) * C;

      document.getElementById('donut-plastic').setAttribute('stroke-dasharray', `${pPl/3} ${C - pPl/3}`);
      document.getElementById('donut-paper').setAttribute('stroke-dasharray',   `${pPa/3} ${C - pPa/3}`);
      document.getElementById('donut-can').setAttribute('stroke-dasharray',     `${pCa/3} ${C - pCa/3}`);
      document.getElementById('donut-paper').setAttribute('stroke-dashoffset',  `${-(pPl/3)}`);
      document.getElementById('donut-can').setAttribute('stroke-dashoffset',    `${-(pPl/3 + pPa/3)}`);
    }

    function setBar(barId, pctId, val) {
      document.getElementById(barId).style.width = val + '%';
      document.getElementById(pctId).textContent  = val + '%';
    }

    // ── 알림 렌더링 ──
    function renderNotifications() {
      const notifList = document.getElementById('notification-list');
      const timeStr = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      let html = '';

      if (trashFull) {
        html += `
          <div class="log-item" style="border-left-color:#e74c3c; background:#fff0f0;">
            <span class="log-time">${timeStr}</span>
            🗑️ <b>쓰레기통이 꽉 찼습니다!</b>
            <div style="margin-top:6px; font-size:12px; color:#c0392b; font-weight:600;">
              ⚠️ 쓰레기통을 비워야 합니다!
            </div>
          </div>`;
      }

      // people = 1: 사람 감지됨 → [작업중] 버튼만 표시
      if (peopleVal === 1) {
        html += `
          <div class="log-item" style="border-left-color:#e67e22; background:#fff8f0;">
            <span class="log-time">${timeStr}</span>
            🚨 <b>작업공간에 사람이 감지되었습니다!</b>
            <div class="log-ask">
              <span>처리 상태를 선택하세요:</span>
              <button class="btn-working" onclick="setPeopleWorking()">🔧 작업중</button>
            </div>
          </div>`;
      }

      // people = 2: 작업중 → [작업완료] 버튼만 표시
      if (peopleVal === 2) {
        html += `
          <div class="log-item" style="border-left-color:#f39c12; background:#fffbf0;">
            <span class="log-time">${timeStr}</span>
            🔧 <b>현재 작업중입니다.</b>
            <div class="log-ask">
              <span>작업이 끝났나요?</span>
              <button class="btn-done" onclick="setPeopleDone()">✅ 작업완료</button>
            </div>
          </div>`;
      }

      if (!html) {
        html = `<div style="color:#bbb; font-size:13px; text-align:center; padding: 2rem 0;">알림이 없습니다</div>`;
      }

      notifList.innerHTML = html;
    }

    // 작업중 버튼 → people = 2
    window.setPeopleWorking = async function () {
      await updateDoc(cctvRef, { people: 2 });
    };

    // 작업완료 버튼 → people = 0
    window.setPeopleDone = async function () {
      await updateDoc(cctvRef, { people: 0 });
    };

    // ── 작업 재개 ──
    window.resumeWork = async function() {
      const snapshot = await getDoc(docRef);
      if (!snapshot.exists()) return;
      const data = snapshot.data();

      const updates = {};
      if ((data.plastic ?? 0) >= 24) updates.plastic = 0;
      if ((data.paper   ?? 0) >= 24) updates.paper   = 0;
      if ((data.can     ?? 0) >= 24) updates.can      = 0;

      if (Object.keys(updates).length > 0) {
        await updateDoc(docRef, updates);
        alert('작업이 재개되었습니다. 해당 항목이 초기화되었습니다.');
      } else {
        alert('작업이 재개되었습니다.');
      }
    };
  </script>

  <script>
    const peer = new Peer({ debug: 0 });

    function connectPeer(videoId, inputId, msgId, num) {
      const remotePeerId = document.getElementById(inputId).value.trim();
      if (!remotePeerId) { alert('ID를 입력하세요!'); return; }
      localStorage.setItem('cctv_peer_id_' + num, remotePeerId);
      const badge = document.getElementById('auto-badge-' + num);
      if (badge) badge.style.display = 'none';
      document.getElementById(msgId).textContent = '연결 중...';
      const call = peer.call(remotePeerId, getDummyStream());
      call.on('stream', (remoteStream) => {
        const video = document.getElementById(videoId);
        video.srcObject = remoteStream;
        video.play();
        document.getElementById(msgId).textContent = '✅ 연결됨';
      });
      call.on('error', (err) => {
        document.getElementById(msgId).textContent = '❌ 오류: ' + err.message;
      });
      call.on('close', () => {
        document.getElementById(msgId).textContent = '🔌 연결 끊김';
      });
    }

    function clearSaved(num) {
      localStorage.removeItem('cctv_peer_id_' + num);
      document.getElementById('peerId' + num).value = '';
      document.getElementById('msg' + num).textContent = 'sender.html의 ID를 입력하세요';
      const badge = document.getElementById('auto-badge-' + num);
      if (badge) badge.style.display = 'none';
      const video = document.getElementById('cctv' + num);
      if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
    }

    function getDummyStream() {
      const canvas = document.createElement('canvas');
      canvas.width = 1; canvas.height = 1;
      return canvas.captureStream();
    }

    peer.on('open', () => {
      [
        { videoId: 'cctv1', inputId: 'peerId1', msgId: 'msg1', num: 1 },
        { videoId: 'cctv2', inputId: 'peerId2', msgId: 'msg2', num: 2 }
      ].forEach(({ videoId, inputId, msgId, num }) => {
        const savedId = localStorage.getItem('cctv_peer_id_' + num);
        if (savedId) {
          document.getElementById(inputId).value = savedId;
          const badge = document.getElementById('auto-badge-' + num);
          if (badge) badge.style.display = 'inline';
          connectPeer(videoId, inputId, msgId, num);
        }
      });
    });
  </script>

</body>
</html>
